name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: python -m pip install -e services/scheduler[dev] jsonschema
      - run: python tools/validate_contracts.py
      - run: cd services/scheduler && pytest
      - run: cd packages/openclaw-plugin && npm ci && npm run typecheck && npm test && npm run build && npm pack
